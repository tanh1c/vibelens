<!DOCTYPE html>
<html>
<style>
  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  body {
    font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    font-size: 13px;
    background-color: #000000;
    color: #FFFFFF;
  }

  ::-webkit-scrollbar {
    width: 8px;
    height: 8px;
  }

  ::-webkit-scrollbar-track {
    background: rgba(255, 255, 255, 0.02);
  }

  ::-webkit-scrollbar-thumb {
    background: rgba(255, 255, 255, 0.1);
    border-radius: 4px;
  }

  ::-webkit-scrollbar-thumb:hover {
    background: rgba(251, 191, 36, 0.3);
  }

  .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 16px;
    background: rgba(255, 255, 255, 0.02);
    border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    box-shadow: 0 4px 10px rgba(0, 0, 0, 0.5);
  }

  .title {
    font-weight: 800;
    color: #FBBF24;
    font-size: 16px;
    letter-spacing: 0.5px;
  }

  .controls {
    display: flex;
    gap: 8px;
    align-items: center;
  }

  .btn {
    padding: 6px 14px;
    border: 1px solid transparent;
    border-radius: 8px;
    cursor: pointer;
    font-size: 12px;
    font-weight: 600;
    transition: all 0.2s ease;
  }

  .btn-primary {
    background: linear-gradient(135deg, #FBBF24 0%, #D4AF37 100%);
    color: #000000;
  }

  .btn-primary:hover {
    box-shadow: 0 4px 15px rgba(251, 191, 36, 0.3);
  }

  .btn-danger {
    background: rgba(239, 68, 68, 0.1);
    color: #F87171;
    border-color: rgba(239, 68, 68, 0.3);
  }

  .btn-danger:hover {
    background: rgba(239, 68, 68, 0.2);
  }

  .btn-secondary {
    background: rgba(255, 255, 255, 0.1);
    color: #FFFFFF;
    border-color: rgba(255, 255, 255, 0.2);
  }

  .btn-secondary:hover {
    background: rgba(255, 255, 255, 0.15);
    border-color: rgba(251, 191, 36, 0.5);
  }

  .btn:disabled {
    opacity: 0.4;
    cursor: not-allowed;
    pointer-events: none;
  }

  .status {
    padding: 4px 10px;
    border-radius: 6px;
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .status.recording {
    background: rgba(251, 191, 36, 0.15);
    color: #FBBF24;
    box-shadow: 0 0 10px rgba(251, 191, 36, 0.2);
    border: 1px solid rgba(251, 191, 36, 0.4);
  }

  .status.stopped {
    background: rgba(255, 255, 255, 0.1);
    color: #A3A3A3;
    border: 1px solid rgba(255, 255, 255, 0.15);
  }

  .filter-bar {
    display: flex;
    padding: 12px 16px;
    gap: 12px;
    background: rgba(255, 255, 255, 0.01);
    border-bottom: 1px solid rgba(255, 255, 255, 0.05);
  }

  .filter-input {
    flex: 1;
    padding: 8px 12px;
    background: rgba(255, 255, 255, 0.05);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 8px;
    font-size: 12px;
    color: #FFFFFF;
    outline: none;
    transition: border-color 0.2s;
  }

  .filter-input:focus {
    border-color: #FBBF24;
    box-shadow: 0 0 0 1px rgba(251, 191, 36, 0.2);
  }

  .filter-input::placeholder {
    color: #737373;
  }

  .request-list {
    height: calc(100vh - 120px);
    overflow-y: auto;
  }

  .request-item {
    display: flex;
    padding: 10px 16px;
    border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    cursor: pointer;
    transition: background 0.2s;
  }

  .request-item:hover {
    background: rgba(255, 255, 255, 0.03);
  }

  .method {
    width: 60px;
    font-weight: 800;
    font-size: 11px;
  }

  .method.GET {
    color: #34D399;
  }

  .method.POST {
    color: #60A5FA;
  }

  .method.PUT {
    color: #FBBF24;
  }

  .method.DELETE {
    color: #F87171;
  }

  .method.PATCH {
    color: #C084FC;
  }

  .url {
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    color: #D4D4D4;
    font-family: monospace;
    font-size: 12px;
    padding-right: 12px;
  }

  .status-code {
    width: 40px;
    text-align: right;
    font-size: 11px;
    font-weight: 700;
  }

  .status-code.success {
    color: #34D399;
  }

  .status-code.redirect {
    color: #FBBF24;
  }

  .status-code.error {
    color: #F87171;
  }

  .time {
    width: 70px;
    text-align: right;
    color: #737373;
    font-size: 11px;
  }

  .ai-panel {
    display: none;
    padding: 16px;
    background: rgba(251, 191, 36, 0.05);
    border-top: 1px solid rgba(251, 191, 36, 0.2);
    max-height: 250px;
    overflow-y: auto;
    box-shadow: inset 0 10px 20px rgba(0, 0, 0, 0.5);
  }

  .ai-panel.visible {
    display: block;
  }

  .ai-response {
    white-space: pre-wrap;
    font-family: 'Consolas', monospace;
    font-size: 12px;
    color: #E5E5E5;
    line-height: 1.5;
  }

  .no-requests {
    padding: 40px;
    text-align: center;
    color: #737373;
    font-weight: 500;
  }
</style>
</head>

<body>
  <div class="header">
    <div class="title">VibeLens Network Tracker</div>
    <div class="controls">
      <span id="status" class="status stopped">Stopped</span>
      <button id="toggleBtn" class="btn btn-primary">Start Recording</button>
      <button id="analyzeBtn" class="btn btn-secondary" disabled>Analyze with AI</button>
      <button id="clearBtn" class="btn btn-danger" disabled>Clear</button>
    </div>
  </div>

  <div class="filter-bar">
    <input type="text" id="filterInput" class="filter-input" placeholder="Filter by URL or method...">
  </div>

  <div id="requestList" class="request-list">
    <div class="no-requests">No requests captured yet. Click "Start Recording" to begin.</div>
  </div>

  <div id="aiPanel" class="ai-panel">
    <div id="aiResponse" class="ai-response"></div>
  </div>

  <script src="devtools.js"></script>
</body>

</html>
